name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Package Companion Module
        run: yarn run package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-module-google-slidescontroller
          path: companion-module-google-slidescontroller*.tgz
          retention-days: 30
